name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Inject Pexels API key into config.js
        run: |
         cat <<EOF > config.js
         const PEXELS_API_KEY = '${{ secrets.PEXELS_API_KEY }}';
         const UNSPLASH_API_KEY = '${{ secrets.SHEETS_ENDPOINT }}';
         EOF

         cat config.js

      - name: List files to confirm
        run: ls -la

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
